<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="container">
    <header class="header">
        <h2>CloudKlp2</h2>
        <button id="btn-logout" class="btn-logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
    </header>

    <form class="search-bar" id="search-form">
        <input type="text" id="search-input" placeholder="Cari file....">
        <button type="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
    </form>

    <div class="actions">
        <button class="btn-primary" onclick="createNewFolder()">
            <i class="fa-solid fa-folder-plus"></i> Create Folder</button>
        <button class="btn-secondary" onclick="document.getElementById('file-input').click()">
            <i class="fa-solid fa-file-arrow-up"></i> Upload File</button>
        <input type="file" id="file-input" style="display: none;" onchange="handleFileUpload(event)">
        <button class="btn-secondary" onclick="document.getElementById('folder-input').click()">
            <i class="fa-solid fa-folder"></i> Upload Folder</button>
        <input type="file" id="folder-input" webkitdirectory style="display: none;" onchange="handleFolderUpload(event)">
    </div>

    <div class="file-preview-wrapper" id="file-preview-wrapper">
    </div>

    <nav class="nav-bottom">
        <button onclick="loadFiles()"><i class="fa-solid fa-house"></i></button>
        <button onclick="document.getElementById('file-input').click()"><i class="fa-solid fa-plus"></i></button>
        <button onclick="logout()"><i class="fa-solid fa-user"></i></button>
    </nav>

    <div id="loading" class="spinner center" style="display: none;"></div>
    <div id="notif-container"></div>

    <script src="js/script.js"></script>
</body>

</html>
